name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to sensawell.github.io
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/sensawell/sensawell.github.io.git target-repo
          rm -rf target-repo/grip-stickers-app
          mkdir -p target-repo/grip-stickers-app
          cp -r dist/spa/. target-repo/grip-stickers-app/
          cd target-repo
          git add -A
          git diff --cached --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy grip-stickers-app @ ${{ github.sha }}"
          git push
